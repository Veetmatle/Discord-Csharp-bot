services:
  discord-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: discord-bot-ai
    restart: unless-stopped
    depends_on:
      openclaw:
        condition: service_started
    
    # Environment variables from .env file
    env_file:
      - .env
    
    # Agent connection settings (override defaults from AppSettings)
    environment:
      - OPENCLAW_BASE_URL=http://openclaw:8080
      - AGENT_SHARED_VOLUME_PATH=/app/agent-output
      - AGENT_SESSION_TIMEOUT_MINUTES=${AGENT_SESSION_TIMEOUT_MINUTES:-10}
      - AGENT_MAX_RETRIES=${AGENT_MAX_RETRIES:-3}
      - AGENT_MAX_CONCURRENT_TASKS=${AGENT_MAX_CONCURRENT_TASKS:-2}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
    
    # Persistent volumes for data, logs and shared agent output
    # NOTE: bot-cache is NOT mounted - static assets are baked into the image
    volumes:
      - bot-data:/app/data
      - bot-logs:/app/logs
      - agent-output:/app/agent-output:ro   # Read-only: bot only reads agent results
    
    networks:
      - bot-internal
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    
    # Graceful shutdown timeout
    stop_grace_period: 30s
    
    # Security options
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:size=64M
      - /home/botuser:size=16M
    
    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  openclaw:
    # Build custom agent image with .NET SDK and Python for code compilation
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: openclaw-agent
    restart: unless-stopped
    
    # Agent API key from .env
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - PORT=8080
      - MAX_ITERATIONS=${AGENT_MAX_RETRIES:-3}
      - AGENT_SESSION_TIMEOUT_MINUTES=${AGENT_SESSION_TIMEOUT_MINUTES:-10}
      - MAX_CONCURRENT_TASKS=${AGENT_MAX_CONCURRENT_TASKS:-2}
      - WORKSPACE_DIR=/workspace
      # Development tools available in container
      - DOTNET_ROOT=/usr/share/dotnet
      - PATH=/opt/venv/bin:/usr/share/dotnet:$PATH
    
    # Agent writes results to shared volume
    volumes:
      - agent-output:/workspace:rw
    
    networks:
      - bot-internal
    
    # Resource limits (agent needs more CPU/memory for .NET/Python compilation)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    
    # Kill agent container if it hangs
    stop_grace_period: 15s
    
    # Security: no privilege escalation, no host network
    security_opt:
      - no-new-privileges:true
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Internal network - containers communicate without exposing ports to host
networks:
  bot-internal:
    driver: bridge
    name: discord-bot-network

# Named volumes for data persistence
volumes:
  bot-data:
    name: discord-bot-data
  bot-logs:
    name: discord-bot-logs
  agent-output:
    name: discord-bot-agent-output
